<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lists</title>
  </head>
  <body>
    <!-- Ordered List -->
    <h2>Lists in HTML</h2>
    <h3>Ordered List</h3>
    <ol>
      <li>Architect</li>
      <li>Batsman</li>
      <li>Criminal</li>
      <li>Doctor</li>
    </ol>

    <h3>Ordered List Using Attribute</h3>
    <ol type="a">
      <li>Architect</li>
      <li>Batsman</li>
      <li>Criminal</li>
      <li>Doctor</li>
    </ol>

    <!-- Un-Ordered List -->
    <h3>Un-Ordered List</h3>
    <ul>
      <li>Bat</li>
      <li>Ball</li>
      <li>Stumps</li>
      <li>Bails</li>
    </ul>
  </body>
</html>
